name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Build Tests (Debug)
        run: |
          dotnet build --no-restore --configuration Debug AbeGaming.GameLogic.Tests/AbeGaming.GameLogic.Tests.csproj
          dotnet build --no-restore --configuration Debug AbeGaming.BlazorApp.Component.Tests/AbeGaming.BlazorApp.Component.Tests.csproj

      - name: Test GameLogic
        run: dotnet test --no-build --configuration Debug --verbosity normal AbeGaming.GameLogic.Tests/AbeGaming.GameLogic.Tests.csproj

      - name: Test Components (bUnit)
        run: dotnet test --no-build --configuration Debug --verbosity normal AbeGaming.BlazorApp.Component.Tests/AbeGaming.BlazorApp.Component.Tests.csproj
